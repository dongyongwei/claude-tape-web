<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>claude·tape · mobile</title>
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/static/vendor/xterm.css" />
  <style>
    :root {
      --bg:#f5f5f7; --s1:#fff; --s2:#f2f2f5; --s3:#e8e8ed;
      --b:rgba(0,0,0,.07); --bm:rgba(0,0,0,.12);
      --t1:#1d1d1f; --t2:#6e6e73; --t3:#aeaeb2;
      --blue:#0071e3; --green:#28a745; --red:#ff3b30;
      --r:14px; --rsm:10px; --rxs:8px;
      --card-shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.05);
      --safe-b:env(safe-area-inset-bottom,0px);
      --safe-t:env(safe-area-inset-top,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:var(--bg);color:var(--t1);
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
      font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
      -webkit-text-size-adjust:100%;}
    .hidden{display:none !important;}
    button,input,select,textarea{font-family:inherit;}
    ::-webkit-scrollbar{width:0;height:0;}

    /* Gate */
    #gate{position:fixed;inset:0;z-index:10;background:var(--bg);
      display:flex;align-items:center;justify-content:center;padding:20px;}
    .gate-box{width:min(360px,92vw);background:var(--s1);border-radius:var(--r);
      padding:28px 22px;box-shadow:var(--card-shadow);}
    .gate-title{font-size:18px;font-weight:600;text-align:center;margin-bottom:4px;}
    .gate-sub{font-size:13px;color:var(--t3);text-align:center;margin-bottom:20px;}
    .gate-box input[type=password]{width:100%;background:var(--s2);color:var(--t1);
      border:1px solid var(--bm);border-radius:var(--rsm);padding:13px 14px;
      font-size:16px;outline:none;margin-bottom:12px;}
    .gate-box input[type=password]:focus{border-color:var(--blue);}
    .gate-remember{display:flex;align-items:center;gap:8px;font-size:14px;
      color:var(--t2);margin-bottom:16px;cursor:pointer;user-select:none;}
    .gate-remember input{width:18px;height:18px;accent-color:var(--blue);}
    #enter{width:100%;background:var(--blue);color:#fff;border:none;
      border-radius:var(--rsm);padding:14px;font-size:16px;font-weight:500;cursor:pointer;}
    #enter:active{filter:brightness(.95);}
    #gate-err{color:var(--red);font-size:13px;min-height:18px;margin-top:10px;text-align:center;}

    /* Lang switcher */
    #lang-sw{position:fixed;top:calc(8px + var(--safe-t));right:12px;z-index:99999;
      display:flex;align-items:center;gap:2px;background:var(--s1);
      border:1px solid var(--bm);border-radius:20px;padding:4px 10px;box-shadow:var(--card-shadow);}
    .lb{background:none;border:none;cursor:pointer;font-size:13px;color:var(--t3);
      padding:2px 5px;border-radius:4px;}
    .lb.active{color:var(--t1);font-weight:600;}
    .lb-sep{font-size:13px;color:var(--t3);}

    /* Home */
    #home{position:fixed;inset:0;z-index:5;overflow-y:auto;background:var(--bg);
      -webkit-overflow-scrolling:touch;}
    .home-wrap{max-width:560px;margin:0 auto;padding:calc(20px + var(--safe-t)) 16px calc(40px + var(--safe-b));}
    .brand{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
    .brand-name{font-size:19px;font-weight:700;letter-spacing:-.02em;color:var(--t1);}
    .brand-name em{font-style:normal;color:#C45A3A;}
    .sec-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
      color:var(--t3);padding:0 4px;margin:26px 0 8px;}
    .sec-label:first-of-type{margin-top:0;}
    .home-card{background:var(--s1);border-radius:var(--r);box-shadow:var(--card-shadow);padding:14px;}
    .new-col{display:flex;flex-direction:column;gap:10px;}
    .new-col select{width:100%;background:var(--s2);color:var(--t1);border:1px solid var(--bm);
      border-radius:var(--rsm);padding:12px;font-size:15px;outline:none;appearance:auto;}
    .new-col #start{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--rsm);
      padding:14px;font-size:16px;font-weight:500;cursor:pointer;}
    .new-col #config{width:100%;background:var(--s2);color:var(--t2);border:1px solid var(--bm);
      border-radius:var(--rsm);padding:12px;font-size:15px;cursor:pointer;}

    /* History */
    .grp{margin-bottom:12px;}
    .grp-head{display:flex;align-items:center;gap:8px;padding:10px 8px;border-radius:var(--rsm);
      cursor:pointer;user-select:none;}
    .grp-head .caret{color:var(--t3);font-size:12px;width:12px;text-align:center;}
    .grp-head .path{color:var(--t2);font-size:13px;word-break:break-all;flex:1;}
    .grp-head .count{font-size:11px;color:var(--t3);background:var(--s3);border-radius:20px;padding:2px 9px;}
    .grp-body{display:flex;flex-direction:column;gap:10px;}
    .scard{background:var(--s1);border-radius:var(--r);box-shadow:var(--card-shadow);padding:12px 14px;}
    .scard-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .scard-top .dot{width:8px;height:8px;flex:none;border-radius:50%;}
    .scard-top .dot.active{background:var(--green);box-shadow:0 0 5px rgba(40,167,69,.4);}
    .scard-top .dot.closed{background:var(--t3);}
    .scard-top .when{color:var(--t2);font-size:13px;font-variant-numeric:tabular-nums;}
    .scard-top .act{margin-left:auto;background:var(--green);color:#fff;border:none;
      border-radius:var(--rxs);padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;}
    .scard-row{display:flex;align-items:flex-start;gap:8px;margin-top:8px;}
    .scard-row .lbl{font-size:12px;color:var(--t3);width:42px;flex:none;padding-top:9px;}
    .scard-row .tag-input{flex:1;min-width:0;background:var(--s2);color:var(--t1);
      border:1px solid var(--bm);border-radius:var(--rxs);padding:8px 10px;font-size:14px;
      outline:none;resize:none;overflow:hidden;line-height:1.4;}
    .scard-row .tag-input:focus{border-color:var(--blue);}
    .scard-row .m-select{flex:1;min-width:0;background:var(--s2);color:var(--blue);
      border:1px solid var(--bm);border-radius:var(--rxs);padding:8px 10px;font-size:14px;
      outline:none;appearance:auto;}
    .scard-row .pk-ok,.scard-row .pk-cancel,.scard-row .mi-del{flex:none;background:var(--s2);
      color:var(--t2);border:1px solid var(--bm);border-radius:var(--rxs);padding:8px 12px;
      font-size:13px;cursor:pointer;}
    .scard-row .mi-del{color:var(--red);border-color:rgba(255,59,48,.25);}
    .tag-btns{display:none;gap:6px;}
    .tag-btns.visible{display:flex;}
    .empty{color:var(--t3);font-size:14px;padding:14px 8px;}

    /* Terminal */
    #termview{position:fixed;inset:0;background:#1e1e1e;display:flex;flex-direction:column;}
    #bar{display:flex;gap:10px;align-items:center;flex:none;
      height:calc(48px + var(--safe-t));padding:var(--safe-t) 12px 0;
      background:rgba(245,245,247,.95);border-bottom:1px solid var(--b);}
    #back{background:var(--s2);color:var(--t2);border:1px solid var(--bm);border-radius:var(--rxs);
      padding:8px 14px;font-size:14px;cursor:pointer;}
    #bar .brand-name{font-size:15px;}
    #status{margin-left:auto;font-size:12px;color:var(--t2);}
    #term{flex:1;min-height:0;padding:4px;overflow:hidden;}

    /* Keys toolbar */
    #keys{flex:none;display:flex;gap:6px;overflow-x:auto;white-space:nowrap;
      padding:8px 10px calc(8px + var(--safe-b));background:#2a2a2e;
      border-top:1px solid rgba(255,255,255,.08);-webkit-overflow-scrolling:touch;}
    #keys::-webkit-scrollbar{height:0;}
    .key{flex:none;min-width:46px;height:38px;display:inline-flex;align-items:center;justify-content:center;
      background:#3a3a40;color:#eaeaea;border:1px solid rgba(255,255,255,.1);border-radius:8px;
      font-size:14px;font-family:Consolas,monospace;cursor:pointer;user-select:none;padding:0 12px;}
    .key:active{background:#4a4a52;}
    .key.armed{background:var(--blue);color:#fff;border-color:var(--blue);}

    /* Config */
    #configview{position:fixed;inset:0;z-index:6;overflow-y:auto;background:var(--bg);
      -webkit-overflow-scrolling:touch;}
    #cfgbar{display:flex;gap:10px;align-items:center;height:calc(48px + var(--safe-t));
      padding:var(--safe-t) 14px 0;background:rgba(245,245,247,.95);border-bottom:1px solid var(--b);
      position:sticky;top:0;z-index:1;}
    #cfg-back{background:var(--s2);color:var(--t2);border:1px solid var(--bm);border-radius:var(--rxs);
      padding:8px 14px;font-size:14px;cursor:pointer;}
    .cfg-title{font-size:15px;font-weight:600;}
    #cfg-status{margin-left:auto;font-size:12px;color:var(--t2);}
    #cfg-body{max-width:560px;margin:0 auto;padding:16px 14px calc(40px + var(--safe-b));}
    .cfg-card{background:var(--s1);border-radius:var(--r);box-shadow:var(--card-shadow);
      padding:14px;margin-bottom:12px;}
    .cfg-h{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
      color:var(--t3);margin-bottom:12px;}
    .cfg-field{display:block;font-size:13px;color:var(--t2);margin-bottom:14px;}
    .cfg-field:last-child{margin-bottom:0;}
    .cfg-field input,.cfg-field textarea{display:block;width:100%;margin-top:6px;background:var(--s2);
      color:var(--t1);border:1px solid var(--bm);border-radius:var(--rsm);padding:11px;font-size:15px;
      outline:none;font-family:"SF Mono","Consolas",monospace;resize:vertical;}
    .cfg-field input:focus,.cfg-field textarea:focus{border-color:var(--blue);}
    .mcard{background:var(--s2);border:1px solid var(--b);border-radius:var(--rsm);
      padding:12px;margin-bottom:10px;}
    .mcard.builtin{opacity:.55;}
    .mcard-h{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .mcard-h .midx{font-size:12px;color:var(--t3);}
    .mcard-h .cfg-builtin-tag{font-size:11px;color:var(--t3);background:var(--s1);
      border:1px solid var(--b);border-radius:20px;padding:2px 9px;}
    .mcard-h .m-del{margin-left:auto;background:transparent;color:var(--red);
      border:1px solid rgba(255,59,48,.25);border-radius:var(--rxs);padding:6px 12px;
      font-size:13px;cursor:pointer;}
    .mcard label{display:block;font-size:11px;color:var(--t3);margin-bottom:8px;}
    .mcard label:last-child{margin-bottom:0;}
    .mcard input{display:block;width:100%;margin-top:4px;background:var(--s1);color:var(--t1);
      border:1px solid var(--bm);border-radius:var(--rxs);padding:9px;font-size:14px;outline:none;
      font-family:"SF Mono","Consolas",monospace;}
    .mcard input:focus{border-color:var(--blue);}
    .mcard input:disabled{opacity:.6;}
    .cfg-add{background:transparent;color:var(--blue);border:1px solid rgba(0,113,227,.3);
      border-radius:var(--rxs);padding:10px 14px;font-size:14px;cursor:pointer;}
    .cfg-actions{display:flex;gap:10px;}
    .cfg-actions button{flex:1;border-radius:var(--rsm);padding:13px;font-size:15px;font-weight:500;
      cursor:pointer;border:none;}
    #cfg-save{background:var(--s2);color:var(--t1);border:1px solid var(--bm) !important;}
    #cfg-apply{background:var(--blue);color:#fff;}

    /* Confirm dialog */
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .confirm-overlay{position:fixed;inset:0;z-index:20000;background:rgba(0,0,0,.35);
      display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .12s ease;}
    .confirm-card{background:var(--s1);border-radius:var(--r);width:min(320px,92vw);
      padding:24px 20px 18px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
    .confirm-msg{font-size:15px;text-align:center;margin-bottom:20px;line-height:1.6;}
    .confirm-actions{display:flex;gap:10px;}
    .confirm-cancel{flex:1;background:var(--s2);color:var(--t1);border:1px solid var(--bm);
      border-radius:var(--rsm);padding:12px;font-size:15px;cursor:pointer;}
    .confirm-ok{flex:1;background:var(--red);color:#fff;border:none;border-radius:var(--rsm);
      padding:12px;font-size:15px;font-weight:500;cursor:pointer;}
  </style>
</head>
<body>
  <div id="gate">
    <div class="gate-box">
      <div class="gate-title">agent_win_serve</div>
      <div class="gate-sub" data-i18n="gate_sub">Enter server access token</div>
      <input id="token-input" type="password" placeholder="Access token"
             data-i18n-ph="gate_placeholder" autocomplete="off" />
      <label class="gate-remember">
        <input type="checkbox" id="remember-token" />
        <span data-i18n="gate_remember">Remember token</span>
      </label>
      <button id="enter" data-i18n="gate_enter">Enter</button>
      <div id="gate-err"></div>
    </div>
  </div>

  <div id="home" class="hidden">
    <div class="home-wrap">
      <div class="brand">
        <svg width="26" height="26" viewBox="0 0 32 32" style="display:block">
          <defs><linearGradient id="bg-grad2" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#E78A6A"/><stop offset="100%" stop-color="#C45A3A"/>
          </linearGradient></defs>
          <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#bg-grad2)"/>
          <path d="M5 19c3 -2 6 -2 11 -2s8 0 11 2" stroke="#FFF7EE" stroke-width="1.6" stroke-linecap="round" fill="none" opacity=".85"/>
          <circle cx="11" cy="14" r="3.4" fill="#FFF7EE"/><circle cx="21" cy="14" r="3.4" fill="#FFF7EE"/>
          <circle cx="11" cy="14" r="1.2" fill="#C45A3A"/><circle cx="21" cy="14" r="1.2" fill="#C45A3A"/>
        </svg>
        <span class="brand-name">claude<em>·</em>tape</span>
      </div>
      <div class="sec-label" data-i18n="sec_new_session">New Session</div>
      <div class="home-card">
        <div class="new-col">
          <select id="model"></select>
          <select id="cwd"></select>
          <button id="start" data-i18n="btn_start">Start</button>
          <button id="config" data-i18n="btn_config">Config</button>
        </div>
      </div>
      <div class="sec-label" data-i18n="sec_history">History</div>
      <div id="history"></div>
    </div>
  </div>

  <div id="termview" class="hidden">
    <div id="bar">
      <button id="back" data-i18n="btn_back">← Back</button>
      <span class="brand-name">claude<em>·</em>tape</span>
      <span id="status"></span>
    </div>
    <div id="term"></div>
    <div id="keys">
      <button class="key" data-seq="esc">Esc</button>
      <button class="key" data-seq="tab">Tab</button>
      <button class="key" id="key-ctrl">Ctrl</button>
      <button class="key" data-seq="up">↑</button>
      <button class="key" data-seq="down">↓</button>
      <button class="key" data-seq="left">←</button>
      <button class="key" data-seq="right">→</button>
      <button class="key" data-seq="enter">Enter</button>
      <button class="key" data-seq="slash">/</button>
    </div>
  </div>

  <div id="configview" class="hidden">
    <div id="cfgbar">
      <button id="cfg-back" data-i18n="btn_cfg_back">← Back</button>
      <span class="cfg-title" data-i18n="cfg_title">Config</span>
      <span id="cfg-status"></span>
    </div>
    <div id="cfg-body">
      <div class="cfg-card">
        <label class="cfg-field">claude_bin
          <input id="cfg-claude-bin" type="text" />
        </label>
        <label class="cfg-field">access_token
          <input id="cfg-token" type="text" />
        </label>
        <label class="cfg-field">
          <span data-i18n="cfg_dirs_label">project_dirs (one per line)</span>
          <textarea id="cfg-dirs" rows="4"></textarea>
        </label>
      </div>
      <div class="cfg-card">
        <div class="cfg-h" data-i18n="cfg_models_label">Models</div>
        <div id="cfg-models"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button id="cfg-add-model" class="cfg-add" data-i18n="cfg_add_model">+ Add model</button>
          <button id="cfg-import-model" class="cfg-add" data-i18n="cfg_import_model">↑ Import</button>
          <button id="cfg-export-model" class="cfg-add" data-i18n="cfg_export_model">↓ Export</button>
        </div>
        <input type="file" id="cfg-import-file" accept=".json" style="display:none">
      </div>
      <div class="cfg-actions">
        <button id="cfg-save" data-i18n="cfg_save">Save</button>
        <button id="cfg-apply" data-i18n="cfg_apply">Apply</button>
      </div>
    </div>
  </div>

  <div id="lang-sw">
    <button class="lb active" data-lang="en">EN</button>
    <span class="lb-sep">|</span>
    <button class="lb" data-lang="zh">中</button>
  </div>

  <script src="/static/vendor/xterm.js"></script>
  <script src="/static/vendor/addon-fit.js"></script>
  <script src="/static/mobile.js"></script>
</body>
</html>
