<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>方案 B · 横向滚动 tab 条</title>
<style>
:root{
  --bg:#f5f5f7;--s1:#fff;--s2:#f2f2f5;--s3:#e8e8ed;
  --b:rgba(0,0,0,.07);--bm:rgba(0,0,0,.12);
  --t1:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --blue:#0071e3;--green:#28a745;--red:#ff3b30;
  --coral:#C45A3A;--coral2:#E78A6A;
  --r:14px;--rsm:10px;--rxs:8px;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#e9e9ee;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  color:var(--t1);min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 12px;gap:14px;-webkit-font-smoothing:antialiased;}
.cap{font-size:13px;color:#8a8a90;text-align:center;max-width:380px;line-height:1.5;}
.cap b{color:var(--coral);}
.phone{width:390px;max-width:100vw;height:780px;max-height:88vh;background:var(--bg);
  border-radius:38px;box-shadow:0 30px 70px rgba(0,0,0,.28),0 0 0 11px #1b1b1d,0 0 0 13px #2c2c2e;
  position:relative;overflow:hidden;display:flex;flex-direction:column;}
@media(max-width:430px){.phone{border-radius:0;height:100vh;max-height:none;box-shadow:none;}body{padding:0;}.cap{display:none;}}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;
  background:#1b1b1d;border-radius:0 0 16px 16px;z-index:200;}

/* top: brand row + tab strip */
.top{flex:none;background:rgba(245,245,247,.92);backdrop-filter:saturate(1.6) blur(12px);
  border-bottom:1px solid var(--b);padding-top:8px;}
.brandrow{display:flex;align-items:center;gap:8px;padding:4px 12px 6px;}
.logo{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--coral2),var(--coral));flex:none;
  display:flex;align-items:center;justify-content:center;color:#FFF7EE;font-size:13px;}
.brand{font-size:15px;font-weight:700;letter-spacing:-.02em;}
.brand em{font-style:normal;color:var(--coral);}
.brandrow .sp{flex:1;}
.brandrow .ico{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;font-size:17px;color:var(--t2);cursor:pointer;border-radius:8px;}
.brandrow .ico:active{background:var(--s3);}

.strip{display:flex;gap:7px;overflow-x:auto;padding:4px 12px 9px;scroll-behavior:smooth;}
.strip::-webkit-scrollbar{height:0;}
.tab{flex:none;display:flex;align-items:center;gap:7px;max-width:170px;padding:8px 12px;
  background:var(--s2);border:1px solid var(--b);border-radius:11px;cursor:pointer;
  font-size:13.5px;color:var(--t2);white-space:nowrap;transition:.14s;}
.tab.home{padding:8px 12px;font-size:16px;}
.tab .lab{overflow:hidden;text-overflow:ellipsis;max-width:118px;}
.tab .x{font-size:15px;color:var(--t3);line-height:1;margin-left:-1px;}
.tab .st{width:7px;height:7px;border-radius:50%;flex:none;}
.tab .st.active{background:var(--green);}.tab .st.closed{background:var(--t3);}
.tab.cur{background:var(--s1);color:var(--t1);font-weight:600;border-color:var(--coral);
  box-shadow:0 1px 3px rgba(196,90,58,.18);}
.tab.add{font-size:18px;padding:8px 13px;color:var(--blue);}

/* body */
.body{flex:1;min-height:0;position:relative;overflow:hidden;}
.view{position:absolute;inset:0;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view.on{display:flex;flex-direction:column;}
#v-term{background:#1e1e1e;}
.term{flex:1;min-height:0;padding:14px 12px;font-family:"SF Mono",Consolas,monospace;
  font-size:12.5px;line-height:1.55;color:#d4d4d4;overflow-y:auto;white-space:pre-wrap;}
.term .pmt{color:#E78A6A;}.term .ok{color:#6cc46c;}.term .dim{color:#7a7a7a;}.term .cy{color:#56b6c2;}
.keys{flex:none;display:flex;gap:6px;overflow-x:auto;padding:8px 10px 12px;background:#2a2a2e;
  border-top:1px solid rgba(255,255,255,.08);}
.keys::-webkit-scrollbar{height:0;}
.key{flex:none;min-width:46px;height:38px;display:inline-flex;align-items:center;justify-content:center;
  background:#3a3a40;color:#eaeaea;border:1px solid rgba(255,255,255,.1);border-radius:8px;
  font-size:14px;font-family:Consolas,monospace;padding:0 12px;}
.wrap{padding:18px 14px 30px;}
.sec{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);
  padding:0 4px;margin:22px 0 8px;}.sec:first-child{margin-top:4px;}
.card{background:var(--s1);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;}
.col{display:flex;flex-direction:column;gap:10px;}
.col select,.col input{width:100%;background:var(--s2);color:var(--t1);border:1px solid var(--bm);
  border-radius:var(--rsm);padding:12px;font-size:15px;outline:none;}
.btn-primary{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--rsm);
  padding:14px;font-size:16px;font-weight:500;cursor:pointer;}
.scard{background:var(--s1);border-radius:var(--r);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px;}
.scard .top2{display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;flex:none;border-radius:50%;}
.dot.active{background:var(--green);box-shadow:0 0 5px rgba(40,167,69,.4);}.dot.closed{background:var(--t3);}
.scard .when{color:var(--t2);font-size:13px;}
.scard .name{font-weight:600;font-size:14px;margin:6px 0 2px;}
.scard .path{color:var(--t3);font-size:12px;font-family:Consolas,monospace;}
.scard .act{margin-left:auto;background:var(--green);color:#fff;border:none;border-radius:var(--rxs);
  padding:7px 15px;font-size:13px;font-weight:500;cursor:pointer;}
</style>
</head>
<body>
<div class="cap"><b>方案 B · 横向滚动 tab 条</b><br>顶栏下方钉一条可左右滑动的 tab 条（最忠实移植桌面 tab-strip），Home 图标固定在最左，会话药丸带状态点 + ×，最右是「＋」。tab 始终可见。</div>
<div class="phone">
  <div class="notch"></div>

  <div class="top">
    <div class="brandrow">
      <div class="logo">◉</div><span class="brand">claude<em>·</em>tape</span>
      <span class="sp"></span>
      <button class="ico" title="配置">⚙</button>
      <button class="ico" title="外网">🌐</button>
    </div>
    <div class="strip" id="strip"></div>
  </div>

  <div class="body">
    <div class="view" id="v-term">
      <div class="term" id="term-text"></div>
      <div class="keys">
        <div class="key">Esc</div><div class="key">Tab</div><div class="key">Ctrl</div>
        <div class="key">↑</div><div class="key">↓</div><div class="key">←</div><div class="key">→</div>
        <div class="key">Enter</div><div class="key">/</div>
      </div>
    </div>
    <div class="view" id="v-home">
      <div class="wrap">
        <div class="sec">新建会话</div>
        <div class="card"><div class="col">
          <select><option>官方 Claude（本机登录）</option><option>kimi-k2</option></select>
          <select><option>D:\proj\auth</option></select>
          <button class="btn-primary" onclick="addTab()">开始</button>
        </div></div>
        <div class="sec">历史记录</div>
        <div class="scard"><div class="top2"><span class="dot active"></span><span class="when">今天 14:22</span>
          <button class="act" onclick="addTab()">激活</button></div><div class="name">修复登录 Bug</div><div class="path">D:\proj\auth</div></div>
        <div class="scard"><div class="top2"><span class="dot closed"></span><span class="when">昨天 19:40</span>
          <button class="act" onclick="addTab()">激活</button></div><div class="name">写单元测试</div><div class="path">D:\proj\core</div></div>
      </div>
    </div>
    <div class="view" id="v-cfg">
      <div class="wrap"><div class="sec">配置</div>
        <div class="card"><div class="col">
          <label style="font-size:13px;color:var(--t2)">claude_bin<input value="claude" style="margin-top:6px"></label>
          <label style="font-size:13px;color:var(--t2)">access_token<input value="••••••••" style="margin-top:6px"></label>
        </div></div></div>
    </div>
  </div>
</div>

<script>
let TABS=[
  {type:"home",label:"主页"},
  {type:"session",label:"修复登录 Bug",st:"active",term:0},
  {type:"session",label:"重构支付模块",st:"active",term:1},
  {type:"session",label:"写单元测试",st:"closed",term:2},
];
let cur=1;
const TERM=[
  `<span class="pmt">$</span> claude --resume <span class="dim">5f3a…</span>\n<span class="ok">●</span> 正在分析 <span class="cy">auth.py</span> 的登录流程…\n  发现 3 处潜在空指针：\n    · line 42  user.token 可能为 None\n    · line 88  session 未校验过期\n<span class="ok">└</span> 已生成修复方案，是否应用？ <span class="dim">(y/n)</span>\n\n<span class="pmt">▏</span>`,
  `<span class="pmt">$</span> claude\n<span class="ok">●</span> 拆分 <span class="cy">PaymentService</span> 为 4 个纯函数…\n<span class="ok">└</span> 单元测试 <span class="ok">12/12 通过</span>\n\n<span class="pmt">▏</span>`,
  `<span class="pmt">$</span> claude\n<span class="ok">●</span> 为 <span class="cy">core/</span> 生成 pytest 用例…\n  覆盖率 <span class="dim">64%</span> → <span class="ok">89%</span>\n<span class="dim">[会话已结束]</span>`,
];
const $=s=>document.querySelector(s);
function renderStrip(){
  $("#strip").innerHTML=TABS.map((t,i)=>{
    const c=i===cur?" cur":"";
    if(t.type==="home")return `<div class="tab home${c}" onclick="pick(${i})">⌂</div>`;
    return `<div class="tab${c}" onclick="pick(${i})"><span class="st ${t.st}"></span><span class="lab">${t.label}</span><span class="x" onclick="event.stopPropagation();kill(${i})">×</span></div>`;
  }).join("")+`<div class="tab add" onclick="addTab()">＋</div>`;
}
function show(){
  document.querySelectorAll(".view").forEach(e=>e.classList.remove("on"));
  const t=TABS[cur];
  if(t.type==="home"){$("#v-home").classList.add("on");}
  else{$("#v-term").classList.add("on");$("#term-text").innerHTML=TERM[t.term]||TERM[0];}
}
function pick(i){cur=i;renderStrip();show();}
function kill(i){if(TABS[i].type==="home")return;TABS.splice(i,1);if(cur>=TABS.length)cur=TABS.length-1;if(cur<0)cur=0;renderStrip();show();}
function addTab(){TABS.push({type:"session",label:"新会话 "+TABS.length,st:"active",term:0});cur=TABS.length-1;renderStrip();show();
  setTimeout(()=>{const s=$("#strip");s.scrollLeft=s.scrollWidth;},0);}
renderStrip();show();
</script>
</body>
</html>
