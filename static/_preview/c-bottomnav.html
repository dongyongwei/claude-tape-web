<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>方案 C · 底部导航 + 滑动会话</title>
<style>
:root{
  --bg:#f5f5f7;--s1:#fff;--s2:#f2f2f5;--s3:#e8e8ed;
  --b:rgba(0,0,0,.07);--bm:rgba(0,0,0,.12);
  --t1:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --blue:#0071e3;--green:#28a745;--red:#ff3b30;
  --coral:#C45A3A;--coral2:#E78A6A;
  --r:14px;--rsm:10px;--rxs:8px;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#e9e9ee;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  color:var(--t1);min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 12px;gap:14px;-webkit-font-smoothing:antialiased;}
.cap{font-size:13px;color:#8a8a90;text-align:center;max-width:380px;line-height:1.5;}
.cap b{color:var(--coral);}
.phone{width:390px;max-width:100vw;height:780px;max-height:88vh;background:var(--bg);
  border-radius:38px;box-shadow:0 30px 70px rgba(0,0,0,.28),0 0 0 11px #1b1b1d,0 0 0 13px #2c2c2e;
  position:relative;overflow:hidden;display:flex;flex-direction:column;}
@media(max-width:430px){.phone{border-radius:0;height:100vh;max-height:none;box-shadow:none;}body{padding:0;}.cap{display:none;}}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;
  background:#1b1b1d;border-radius:0 0 16px 16px;z-index:200;}

/* top: title + session dots */
#bar{flex:none;height:54px;display:flex;align-items:center;gap:10px;padding:0 14px;padding-top:6px;
  background:rgba(245,245,247,.92);backdrop-filter:saturate(1.6) blur(12px);border-bottom:1px solid var(--b);}
#bar .title{flex:1;min-width:0;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#bar .title .sub{display:block;font-size:11px;font-weight:400;color:var(--t3);margin-top:1px;}
.dots{display:flex;gap:6px;align-items:center;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--t3);transition:.2s;cursor:pointer;}
.sdot.on{background:var(--coral);width:20px;border-radius:5px;}
.swbtn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:none;
  border:none;font-size:15px;color:var(--t2);cursor:pointer;}

.body{flex:1;min-height:0;position:relative;overflow:hidden;}
.view{position:absolute;inset:0;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view.on{display:flex;flex-direction:column;}
#v-term{background:#1e1e1e;}
.term{flex:1;min-height:0;padding:14px 12px;font-family:"SF Mono",Consolas,monospace;
  font-size:12.5px;line-height:1.55;color:#d4d4d4;overflow-y:auto;white-space:pre-wrap;}
.term .pmt{color:#E78A6A;}.term .ok{color:#6cc46c;}.term .dim{color:#7a7a7a;}.term .cy{color:#56b6c2;}
.swipe-hint{position:absolute;top:50%;font-size:22px;color:rgba(255,255,255,.18);pointer-events:none;}
.swipe-hint.l{left:6px;}.swipe-hint.r{right:6px;}
.keys{flex:none;display:flex;gap:6px;overflow-x:auto;padding:8px 10px 10px;background:#2a2a2e;
  border-top:1px solid rgba(255,255,255,.08);}
.keys::-webkit-scrollbar{height:0;}
.key{flex:none;min-width:46px;height:38px;display:inline-flex;align-items:center;justify-content:center;
  background:#3a3a40;color:#eaeaea;border:1px solid rgba(255,255,255,.1);border-radius:8px;
  font-size:14px;font-family:Consolas,monospace;padding:0 12px;}
.wrap{padding:18px 14px 30px;}
.sec{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);
  padding:0 4px;margin:22px 0 8px;}.sec:first-child{margin-top:4px;}
.card{background:var(--s1);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;}
.col{display:flex;flex-direction:column;gap:10px;}
.col select,.col input{width:100%;background:var(--s2);color:var(--t1);border:1px solid var(--bm);
  border-radius:var(--rsm);padding:12px;font-size:15px;outline:none;}
.btn-primary{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--rsm);
  padding:14px;font-size:16px;font-weight:500;cursor:pointer;}
.scard{background:var(--s1);border-radius:var(--r);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px;}
.scard .top2{display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;flex:none;border-radius:50%;}
.dot.active{background:var(--green);}.dot.closed{background:var(--t3);}
.scard .when{color:var(--t2);font-size:13px;}
.scard .name{font-weight:600;font-size:14px;margin:6px 0 2px;}
.scard .path{color:var(--t3);font-size:12px;font-family:Consolas,monospace;}
.scard .act{margin-left:auto;background:var(--green);color:#fff;border:none;border-radius:var(--rxs);
  padding:7px 15px;font-size:13px;font-weight:500;cursor:pointer;}

/* bottom nav */
.nav{flex:none;display:flex;background:rgba(245,245,247,.95);backdrop-filter:saturate(1.6) blur(12px);
  border-top:1px solid var(--b);padding-bottom:env(safe-area-inset-bottom,0);}
.nav .ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 8px;
  background:none;border:none;cursor:pointer;color:var(--t3);}
.nav .ni .ic{font-size:20px;line-height:1;}
.nav .ni .tx{font-size:10.5px;font-weight:500;}
.nav .ni.on{color:var(--coral);}
.nav .ni.new .ic{width:34px;height:34px;border-radius:11px;background:var(--coral);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:1px;}
.nav .ni.new{color:var(--coral);}
</style>
</head>
<body>
<div class="cap"><b>方案 C · 底部导航 + 滑动会话</b><br>底部固定一条导航（主页 / 新建 / 配置 / 外网）；会话之间左右滑动切换，顶部用圆点指示当前第几个会话。导航与会话分离，纯拇指操作。</div>
<div class="phone">
  <div class="notch"></div>

  <div id="bar">
    <div class="title"><span id="bar-title">修复登录 Bug</span><span class="sub" id="bar-sub">D:\proj\auth · 1/3</span></div>
    <div class="dots" id="dots"></div>
    <button class="swbtn" title="全部会话">⊞</button>
  </div>

  <div class="body">
    <div class="view on" id="v-term" onclick="tapSwipe(event)">
      <div class="swipe-hint l">‹</div><div class="swipe-hint r">›</div>
      <div class="term" id="term-text"></div>
      <div class="keys">
        <div class="key">Esc</div><div class="key">Tab</div><div class="key">Ctrl</div>
        <div class="key">↑</div><div class="key">↓</div><div class="key">←</div><div class="key">→</div>
        <div class="key">Enter</div><div class="key">/</div>
      </div>
    </div>
    <div class="view" id="v-home">
      <div class="wrap">
        <div class="sec">新建会话</div>
        <div class="card"><div class="col">
          <select><option>官方 Claude（本机登录）</option></select>
          <select><option>D:\proj\auth</option></select>
          <button class="btn-primary" onclick="nav('term')">开始</button>
        </div></div>
        <div class="sec">历史记录</div>
        <div class="scard"><div class="top2"><span class="dot active"></span><span class="when">今天 14:22</span>
          <button class="act" onclick="nav('term')">激活</button></div><div class="name">修复登录 Bug</div><div class="path">D:\proj\auth</div></div>
        <div class="scard"><div class="top2"><span class="dot closed"></span><span class="when">昨天 19:40</span>
          <button class="act" onclick="nav('term')">激活</button></div><div class="name">写单元测试</div><div class="path">D:\proj\core</div></div>
      </div>
    </div>
    <div class="view" id="v-cfg">
      <div class="wrap"><div class="sec">配置</div>
        <div class="card"><div class="col">
          <label style="font-size:13px;color:var(--t2)">claude_bin<input value="claude" style="margin-top:6px"></label>
          <label style="font-size:13px;color:var(--t2)">access_token<input value="••••••••" style="margin-top:6px"></label>
        </div></div></div>
    </div>
    <div class="view" id="v-ext">
      <div class="wrap"><div class="sec">外网访问</div>
        <div class="card"><div class="col">
          <div style="font-size:13px;color:var(--t2);line-height:1.5">frps 内网穿透，开启后生成 <b>tape-xxxx.example.com</b>，配二维码一扫即用。</div>
          <button class="btn-primary" style="background:var(--coral)">开启外网访问</button>
        </div></div></div>
    </div>
  </div>

  <div class="nav">
    <button class="ni" data-v="home" onclick="nav('home')"><span class="ic">⌂</span><span class="tx">主页</span></button>
    <button class="ni" data-v="term" onclick="nav('term')"><span class="ic">▤</span><span class="tx">会话</span></button>
    <button class="ni new" onclick="nav('term')"><span class="ic">＋</span><span class="tx">新建</span></button>
    <button class="ni" data-v="cfg" onclick="nav('cfg')"><span class="ic">⚙</span><span class="tx">配置</span></button>
    <button class="ni" data-v="ext" onclick="nav('ext')"><span class="ic">🌐</span><span class="tx">外网</span></button>
  </div>
</div>

<script>
const SESS=[
  {nm:"修复登录 Bug",path:"D:\\proj\\auth"},
  {nm:"重构支付模块",path:"D:\\proj\\pay"},
  {nm:"写单元测试",path:"D:\\proj\\core"},
];
let cur=0,view="term";
const TERM=[
  `<span class="pmt">$</span> claude --resume <span class="dim">5f3a…</span>\n<span class="ok">●</span> 正在分析 <span class="cy">auth.py</span> …\n  发现 3 处潜在空指针\n<span class="ok">└</span> 已生成修复方案 <span class="dim">(y/n)</span>\n\n<span class="pmt">▏</span>`,
  `<span class="pmt">$</span> claude\n<span class="ok">●</span> 拆分 <span class="cy">PaymentService</span> …\n<span class="ok">└</span> 测试 <span class="ok">12/12 通过</span>\n\n<span class="pmt">▏</span>`,
  `<span class="pmt">$</span> claude\n<span class="ok">●</span> 生成 pytest 用例\n  覆盖率 <span class="dim">64%</span> → <span class="ok">89%</span>\n<span class="dim">[会话已结束]</span>`,
];
const $=s=>document.querySelector(s);
function renderDots(){
  $("#dots").innerHTML=SESS.map((s,i)=>`<span class="sdot ${i===cur?'on':''}" onclick="sel(${i})"></span>`).join("");
}
function renderTerm(){
  $("#term-text").innerHTML=TERM[cur];
  $("#bar-title").textContent=SESS[cur].nm;
  $("#bar-sub").textContent=SESS[cur].path+" · "+(cur+1)+"/"+SESS.length;
}
function nav(v){
  view=v;
  document.querySelectorAll(".view").forEach(e=>e.classList.remove("on"));
  $("#v-"+v).classList.add("on");
  document.querySelectorAll(".nav .ni[data-v]").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  $("#dots").style.visibility=v==="term"?"visible":"hidden";
  if(v==="term"){renderTerm();}
}
function sel(i){cur=i;renderDots();renderTerm();}
function tapSwipe(e){ // tap left/right third to simulate swipe
  const x=e.clientX-e.currentTarget.getBoundingClientRect().left;
  const w=e.currentTarget.clientWidth;
  if(x<w*0.28){if(cur>0)sel(cur-1);}
  else if(x>w*0.72){if(cur<SESS.length-1)sel(cur+1);}
}
renderDots();renderTerm();nav("term");
</script>
</body>
</html>
